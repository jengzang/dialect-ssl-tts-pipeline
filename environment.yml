name: dialect-speech
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  # Python
  - python=3.10

  # Core scientific computing
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scipy>=1.10.0

  # Audio processing
  - librosa>=0.10.0
  - soundfile>=0.12.0

  # Machine learning
  - scikit-learn>=1.3.0
  - joblib>=1.3.0

  # Deep learning (PyTorch)
  - pytorch>=2.0.0
  - torchaudio>=2.0.0
  - torchvision>=0.15.0
  - cudatoolkit=11.8  # 根据 GPU 调整版本

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # Jupyter
  - jupyter>=1.0.0
  - ipykernel>=6.23.0

  # Montreal Forced Aligner
  - montreal-forced-aligner>=2.2.0

  # Utilities
  - pyyaml>=6.0
  - tqdm>=4.65.0

  # pip dependencies
  - pip>=23.0
  - pip:
    # Praat interface
    - praat-parselmouth>=0.4.3

    # Transformers
    - transformers>=4.30.0
    - datasets>=2.14.0
    - tokenizers>=0.13.0

    # CLI tools
    - click>=8.1.0
    - rich>=13.0.0

    # Monitoring
    - tensorboard>=2.13.0
    - wandb>=0.15.0

    # Data formats
    - h5py>=3.8.0
    - openpyxl>=3.1.0

    # Utilities
    - python-dotenv>=1.0.0

    # Testing
    - pytest>=7.3.0
    - pytest-cov>=4.1.0

    # Code quality
    - black>=23.3.0
    - flake8>=6.0.0
    - isort>=5.12.0
